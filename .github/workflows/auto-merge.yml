name: Auto Merge Simple PRs

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# 需要写权限来审批和合并 PR
permissions:
  contents: write
  pull-requests: write

jobs:
  evaluate-and-merge:
    runs-on: ubuntu-latest
    # 仅在 PR 未被 Draft 且状态开启时运行
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v42

      - name: Install Python YAML Parser
        run: pip install pyyaml

      - name: Evaluate Front Matter Rules
        id: rules
        env:
          CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          python3 -c "
          import os, sys, yaml, re

          files = os.environ.get('CHANGED_FILES', '').split()
          if not files:
              print('没有检测到文件变更。')
              sys.exit(0)

          # 定义规则常量
          SAFE_TYPES = ['learning', 'diary', 'sop']
          CONDITIONAL_TYPES = ['finance']
          MAX_FINANCE_AMOUNT = 500.0

          is_all_safe = True

          for filepath in files:
              # 1. 拦截非 Markdown 文件（如代码、脚本）
              if not filepath.endswith('.md'):
                  print(f'::notice::发现非文档文件: {filepath}。中止自动合并。')
                  is_all_safe = False
                  break

              # 2. 读取文件提取 Front Matter
              try:
                  with open(filepath, 'r', encoding='utf-8') as f:
                      content = f.read()

                  match = re.match(r'^---\n(.*?)\n---', content, re.DOTALL)
                  if not match:
                      print(f'::warning::文件缺失 Front Matter: {filepath}。中止自动合并。')
                      is_all_safe = False
                      break

                  fm = yaml.safe_load(match.group(1))
                  doc_type = fm.get('type')

                  # 3. 校验 Type
                  if doc_type in SAFE_TYPES:
                      print(f'✅ {filepath} 为安全类型 ({doc_type})')
                      continue

                  elif doc_type in CONDITIONAL_TYPES:
                      if doc_type == 'finance':
                          # 假设财务报销文档可以附加 amount 字段
                          amount = float(fm.get('amount', 999999))
                          if amount <= MAX_FINANCE_AMOUNT:
                              print(f'✅ {filepath} 为小额报销 (金额: {amount})')
                              continue
                          else:
                              print(f'::notice::发现大额报销 ({amount} > {MAX_FINANCE_AMOUNT}): {filepath}。需要人工审批。')
                              is_all_safe = False
                              break

                  else:
                      print(f'::notice::文件类型不属于自动放行白名单 ({doc_type}): {filepath}。中止自动合并。')
                      is_all_safe = False
                      break

              except Exception as e:
                  print(f'::error::解析文件 {filepath} 失败: {e}')
                  is_all_safe = False
                  break

          # 输出最终决策给下一个 Step
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'should_merge={str(is_all_safe).lower()}\n')
          "

      - name: Approve PR (AI Bot)
        if: steps.rules.outputs.should_merge == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr review ${{ github.event.pull_request.number }} --approve --body "🤖 **AI 知识库管理员检测结果**：
          本次 PR 仅包含纯文本更新，且 Front Matter 类型均在安全白名单内（学习/日记/轻量SOP/小额财务）。
          系统已自动批准！"

      - name: Auto Merge PR
        if: steps.rules.outputs.should_merge == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} --merge --auto